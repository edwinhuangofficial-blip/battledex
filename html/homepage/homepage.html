<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="homepage.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>BattleDex</title>
  </head>
  <body>
    <div class="homepagebar">
      <div class="bar-left">
        <h2 id="homebutton" onclick="window.location.replace('homepage.html')">
          BattleDex
        </h2>
      </div>
      <div class="bar-mid">
        <div class="searchbarbut">
          <input type="text" id="searchbarid" placeholder="Search Pokemon..." />
          <button id="searchbutton" onclick="pokeSearch()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="10" cy="10" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
      </div>
      <div class="bar-right">
        <button onclick="">Settings</button
        ><!--make this work later-->
      </div>
    </div>
    <hr />
    <div id="poke-grid"></div>
    <!--pokemon for the homepage-->
    <div id="load"></div>
    <!--loading trip to pre-load pokemon so its smooth infinite scrolling-->
    <script>
      //search bar
      document //makes it so u can press enter to search not just button
        .getElementById("searchbarid")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            pokeSearch(); //search function
          }
        });

      document.addEventListener("keydown", function (e) {
        if (
          //so u can press / to open search bar like google
          e.key === "/" &&
          document.activeElement !== document.getElementById("searchbarid")
        ) {
          e.preventDefault();
          document.getElementById("searchbarid").focus();
        }
      });
      let offset = 0;
      let isLoading = false;
      let reachedEnd = false;
      async function loadGrid() {
        if (isLoading || reachedEnd) {
          return;
        }

        isLoading = true;
        const response = await fetch(
          "https://pokeapi.co/api/v2/pokemon?limit=60&offset=" + offset,
        );
        const data = await response.json();
        const grid = document.getElementById("poke-grid");

        if (!data.next) {
          reachedEnd = true;
        }
        for (const pokemon of data.results) {
          const card = document.createElement("div");
          card.className = "pokecard";
          card.innerHTML = `<p>${pokemon.name}</p>`;
          card.onclick = () => {
            window.location.href = "pokemoninfo.html?pokemon=" + pokemon.name;
          };
          grid.appendChild(card);
          fetchCardData(card, pokemon.url);
        }
        offset += 60;
        isLoading = false;
      }

      async function fetchCardData(card, url) {
        const data = await (await fetch(url)).json();
        const types = data.types.map((t) => t.type.name).join("/");

        card.innerHTML = `
          <img src="${data.sprites.other["official-artwork"].front_default}"/>
          <p>#${data.id} ${data.name.replace(/-/g, " ")}</p>
          <p>${types}</p>
        `;
        card.onclick = () => {
          window.location.href = "pokemoninfo.html?pokemon=" + data.name;
        };
      }
      let isSearching = false;
      async function pokeSearch() {
        if (isSearching) {
          return;
        }
        isSearching = true;
        const pokename = document
          .getElementById("searchbarid")
          .value.toLowerCase()
          .trim()
          .replace(/\s+/g, "-");
        if (!pokename) {
          alert("Empty, please type a valid Pokemon first!");
          isSearching = false;
          return;
        }
        try {
          const response = await fetch(
            "https://pokeapi.co/api/v2/pokemon/" + pokename,
          );
          if (response.ok) {
            window.location.href = "pokemoninfo.html?pokemon=" + pokename;
          } else {
            alert("That's not a Pokemon! Type an actual Pokemon");
            isSearching = false;
          }
        } catch (error) {
          alert("Check your connection and try again");
          isSearching = false;
        }
        isSearching = false;
      }

      const loadObserve = document.getElementById("load");
      const observer = new IntersectionObserver(
        async (entries) => {
          if (entries[0].isIntersecting) {
            await loadGrid();
            if (reachedEnd) {
              observer.disconnect();
            } else {
              observer.unobserve(loadObserve);
              observer.observe(loadObserve);
            }
          }
        },
        { rootMargin: "900px" },
      );

      observer.observe(document.getElementById("load"));
    </script>
  </body>
</html>
